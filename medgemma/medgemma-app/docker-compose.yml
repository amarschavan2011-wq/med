version: "3.9"

# ===================================================================
# MedGemma Clinical AI — Docker Compose
# ===================================================================
# Usage:
#   docker-compose up --build                  # CPU (demo mode)
#   DEMO_MODE=false docker-compose up --build  # Load real model
#   docker-compose --profile gpu up --build    # With GPU support
# ===================================================================

services:
  # ------------------------------------------------------------------
  # FastAPI Backend
  # ------------------------------------------------------------------
  backend:
    build:
      context: .
      target: backend
    container_name: medgemma-backend
    restart: unless-stopped
    environment:
      - DEMO_MODE=${DEMO_MODE:-true}
      - HF_TOKEN=${HF_TOKEN:-}
      - MEDGEMMA_MODEL=${MEDGEMMA_MODEL:-google/medgemma-4b-it}
      - MAX_NEW_TOKENS=${MAX_NEW_TOKENS:-512}
      - API_PORT=8000
      - ENV=production
    volumes:
      - model_cache:/root/.cache/huggingface
      - ./data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - medgemma-net

  # ------------------------------------------------------------------
  # Streamlit Frontend
  # ------------------------------------------------------------------
  frontend:
    build:
      context: .
      target: frontend
    container_name: medgemma-frontend
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - medgemma-net

  # ------------------------------------------------------------------
  # Optional: Nginx reverse proxy (uncomment for production)
  # ------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: medgemma-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - medgemma-net

# ------------------------------------------------------------------
# Volumes & Networks
# ------------------------------------------------------------------
volumes:
  model_cache:
    driver: local

networks:
  medgemma-net:
    driver: bridge
